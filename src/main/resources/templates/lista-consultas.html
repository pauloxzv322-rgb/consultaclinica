<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agenda de Consultas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">Agenda de Consultas</h2>
        <div>
            <a href="/" class="btn btn-outline-secondary shadow-sm me-2">Página Inicial</a>
            
            <a th:href="@{/consultas/nova}" class="btn btn-success shadow-sm">
                + Agendar Nova Consulta
            </a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-bordered shadow-sm bg-white">
            <thead class="table-dark">
                <tr>
                    <th scope="col">Paciente</th>
                    <th scope="col">Data e Horário</th>
                    <th scope="col" class="text-center">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${consultas}">
                    <td th:text="${c.paciente?.nome ?: 'Paciente não informado'}" class="fw-bold"></td>
                    <td th:text="${#temporals.format(c.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="text-center">
                        <a th:href="@{/consultas/excluir/{id}(id=${c.id})}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Deseja cancelar esta consulta?')">
                           Cancelar
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(consultas)}">
                    <td colspan="3" class="text-center text-muted py-5">Nenhuma consulta agendada.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
