<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card col-md-6 offset-md-3 shadow border-0" style="border-radius: 15px;">
            <div class="card-header bg-primary text-white text-center py-3" style="border-radius: 15px 15px 0 0;">
                <h4 class="mb-0">Cadastrar / Editar Paciente</h4>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/pacientes/salvar}" th:object="${paciente}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo:</label>
                        <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: Paulo Henrique" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">CPF:</label>
                        <input type="text" th:field="*{cpf}" class="form-control" placeholder="000.000.000-00" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Salvar Paciente</button>
                        <a th:href="@{/pacientes}" class="btn btn-link text-muted">Voltar para Lista de Pacientes</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
