<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card col-md-6 offset-md-3 p-4 shadow border-0" style="border-radius: 15px;">
            <h3 class="text-center mb-4 text-success">Novo Paciente</h3>
            <form th:action="@{/pacientes/salvar}" th:object="${paciente}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome Completo:</label>
                    <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: Ana Souza" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">CPF:</label>
                    <input type="text" th:field="*{cpf}" class="form-control" placeholder="000.000.000-00" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">Salvar Dados</button>
                    <a href="/pacientes" class="btn btn-link text-muted">Cancelar e Voltar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
