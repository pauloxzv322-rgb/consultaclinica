<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agendar Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card col-md-6 offset-md-3 shadow border-0" style="border-radius: 15px;">
            <div class="card-header bg-info text-white text-center py-3" style="border-radius: 15px 15px 0 0;">
                <h4 class="mb-0">Novo Agendamento</h4>
            </div>
            
            <div class="card-body p-4">
                <form th:action="@{/consultas/salvar}" th:object="${consulta}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Selecione o Paciente:</label>
                        <select th:field="*{paciente}" class="form-select" required>
                            <option value="">Escolha um paciente da lista...</option>
                            <option th:each="p : ${pacientes}" 
                                    th:value="${p.id}" 
                                    th:text="${p.nome}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Data e Horário:</label>
                        <input type="datetime-local" th:field="*{dataHora}" class="form-control" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-info text-white btn-lg shadow-sm">
                            Confirmar Agendamento
                        </button>
                        <a th:href="@{/consultas}" class="btn btn-link text-muted">Cancelar e Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
