<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4 bg-light">
    <div class="card shadow p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary">Pacientes Cadastrados</h2>
            <a href="/pacientes/novo" class="btn btn-success">+ Novo Paciente</a>
        </div>
        
        <table class="table table-hover border">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th class="text-center">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${pacientes}">
                    <td th:text="${p.id}" class="fw-bold"></td>
                    <td th:text="${p.nome}"></td>
                    <td th:text="${p.cpf}"></td>
                    <td class="text-center">
                        <a th:href="@{/pacientes/excluir/{id}(id=${p.id})}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Excluir este paciente?')">Excluir</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pacientes)}">
                    <td colspan="4" class="text-center text-muted">Nenhum paciente no banco.</td>
                </tr>
            </tbody>
        </table>
        <div class="mt-3">
            <a href="/" class="btn btn-secondary">🏠 Voltar ao Início</a>
        </div>
    </div>
</body>
</html>
