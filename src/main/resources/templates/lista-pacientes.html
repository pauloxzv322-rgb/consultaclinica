<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">Pacientes Cadastrados</h2>
        <div>
            <a href="/" class="btn btn-outline-secondary me-2">Início</a>
            <a href="/pacientes/novo" class="btn btn-primary">+ Novo Paciente</a>
        </div>
    </div>

    <table class="table table-hover table-bordered shadow-sm bg-white">
        <thead class="table-dark">
            <tr>
                <th>Nome</th>
                <th>CPF</th>
                <th class="text-center">Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${pacientes}">
                <td th:text="${p.nome}" class="fw-bold"></td>
                <td th:text="${p.cpf}"></td>
                <td class="text-center">
                    <a th:href="@{/pacientes/editar/{id}(id=${p.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/pacientes/excluir/{id}(id=${p.id})}" 
                       class="btn btn-danger btn-sm" 
                       onclick="return confirm('Excluir este paciente apagará suas consultas. Confirmar?')">Excluir</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
