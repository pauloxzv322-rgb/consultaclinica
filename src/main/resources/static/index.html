<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🏥 Clínica Tech - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { transition: transform 0.2s; border: none; }
        .card:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-5 shadow">
        <div class="container"><a class="navbar-brand fw-bold" href="/">🏥 CLÍNICA TECH</a></div>
    </nav>

    <div class="container">
        <div class="row g-4 justify-content-center">
            <div class="col-md-4">
                <div class="card shadow p-4 text-center">
                    <h3 class="mb-3">Pacientes</h3>
                    <p class="text-muted">Visualize todos os pacientes cadastrados no sistema.</p>
                    <a href="/pacientes" class="btn btn-primary btn-lg">Ver Lista</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow p-4 text-center">
                    <h3 class="mb-3">Novo</h3>
                    <p class="text-muted">Adicione um novo paciente ao banco de dados agora.</p>
                    <a href="/pacientes/novo" class="btn btn-success btn-lg">Cadastrar</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow p-4 text-center">
                    <h3 class="mb-3">Agenda</h3>
                    <p class="text-muted">Consulte os horários e marque novas consultas.</p>
                    <a href="/consultas" class="btn btn-info btn-lg text-white">Ver Agenda</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
